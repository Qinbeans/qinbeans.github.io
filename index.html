<!DOCTYPE html>
<html lang="en">
   <head>
      <title>Qinbean's Website</title>
      <!-- head -->
      <link rel="stylesheet" href="home.css">
      <link rel="stylesheet" href="slideshow.css">
   </head>
   <body>
      <h1 id = "title">
         <button class = "home" onclick = "document.location='https://qinbeans.github.io/'"><strong>Qinbeans</strong></button>
         <button class = "menu" onclick = "document.location='https://qinbeans.github.io/about'"><strong>About</strong></button>
         <button class = "menu" onclick = "document.location='https://qinbeans.github.io/projects'"><strong>Projects</strong></button>
      </h1>
      <br>
      <!-- https://www.w3schools.com/howto/howto_js_slideshow.asp -->
      <div class="slideshow-container">
         <!-- Full-width images with number and caption text -->
         <div class="mySlides fade">
            <div class="numbertext">1 / 4</div>
            <img src="imgs/beach.jpg" id = "img">
            <div class="text">Taking a look at the sun</div>
         </div>
       
         <div class="mySlides fade">
            <div class="numbertext">2 / 4</div>
            <img src="imgs/2dgame_alpha.PNG" id = "img">
            <div class="text">Initial version of 2D Game</div>
         </div>
       
         <div class="mySlides fade">
            <div class="numbertext">3 / 4</div>
            <img src="imgs/2dgame_alpha2.PNG" id = "img">
            <div class="text">Second version of the 2D Game</div>
         </div>
         <div class="mySlides fade">
            <div class="numbertext">4 / 4</div>
            <img src="imgs/2dgame_server_alpha.PNG" id = "img">
            <div class="text">Some server output</div>
         </div>
      </div>
      <br>
   
      <!-- The dots/circles -->
      <div style="text-align:center">
         <span class="dot" onclick="currentSlide(1)"></span>
         <span class="dot" onclick="currentSlide(2)"></span>
         <span class="dot" onclick="currentSlide(3)"></span>
         <span class="dot" onclick="currentSlide(4)"></span>
      </div>
      <script>
         var slideIndex = 1;
         showSlides(slideIndex);

         // Next/previous controls
         function plusSlides(n) {
            showSlides(slideIndex += n);
         }

         // Thumbnail image controls
         function currentSlide(n) {
            showSlides(slideIndex = n);
         }

         function showSlides(n) {
            var i;
            var slides = document.getElementsByClassName("mySlides");
            var dots = document.getElementsByClassName("dot");
            if (n > slides.length) {slideIndex = 1}
            if (n < 1) {slideIndex = slides.length}
            for (i = 0; i < slides.length; i++) {
               slides[i].style.display = "none";
            }
            for (i = 0; i < dots.length; i++) {
               dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex-1].style.display = "block";
            dots[slideIndex-1].className += " active";
         }
      </script>
      <br>
      <p id = "quote">
         "The way to get started is to quit talking and begin doing." -Walt Disney
      </p>
      <script src = "menu.js"></script>
   </body>
</html>
